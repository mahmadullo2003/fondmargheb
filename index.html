<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мониторинги Фонди Марғеб</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --success: #22c55e;
            --text: #f8fafc;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            padding: 30px 15px;
            text-align: center;
            background: linear-gradient(180deg, rgba(56,189,248,0.1) 0%, rgba(15,23,42,1) 100%);
        }

        .dashboard {
            width: 95%;
            max-width: 600px;
            margin-top: -20px;
        }

        .main-card {
            background: var(--card);
            padding: 25px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255,255,255,0.05);
            margin-bottom: 20px;
        }

        .total-amount { font-size: 40px; font-weight: 800; color: var(--success); margin: 5px 0; }

        .list-item {
            background: var(--card);
            margin-bottom: 12px;
            padding: 15px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 8px;
        }

        .name { font-weight: 700; color: var(--text); font-size: 16px; }
        .amount-tag { font-weight: 800; color: var(--success); font-size: 18px; }

        .details-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            font-size: 12px;
            opacity: 0.8;
        }

        .detail-label { color: var(--accent); font-weight: 600; text-transform: uppercase; font-size: 10px; display: block; }

        footer {
            margin-top: auto;
            padding: 30px;
            text-align: center;
            width: 100%;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        #loader { 
            position: fixed; inset: 0; background: var(--bg); 
            display: flex; justify-content: center; align-items: center; z-index: 100; 
        }

        .spinner {
            width: 40px; height: 40px; border: 4px solid rgba(56,189,248,0.1);
            border-left-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loader"><div class="spinner"></div></div>

<header>
    <h1 style="color: var(--accent); font-size: 18px; margin: 0; letter-spacing: 1px;">ФОНДИ ДЕҲАИ МАРҒЕБ</h1>
    <p id="monthYear" style="opacity: 0.6; font-size: 12px; margin: 5px 0;">Ҳисоботи апрели 2026</p>
</header>

<div class="dashboard">
    <div class="main-card">
        <span style="font-size: 11px; text-transform: uppercase; letter-spacing: 2px; opacity: 0.7;">Захираи Умумӣ</span>
        <div class="total-amount" id="grandTotal">0</div>
        <span style="font-size: 14px; opacity: 0.6; font-weight: 600;">СОМОНӢ</span>
    </div>

    <div id="dataList"></div>
</div>

<footer>
    <span style="opacity: 0.5; font-size: 10px; text-transform: uppercase;">Ҳисобот диҳанда</span><br>
    <strong style="color: var(--accent); font-size: 18px;">Нарзиев Маҳмадулло</strong>
</footer>

<script>
    const apiUrl = 'https://api.github.com/repos/mahmadullo2003/fondmargheb/contents/data.xlsx';

    async function loadExcel() {
        try {
            const response = await fetch(apiUrl, { 
                headers: { 'Accept': 'application/vnd.github.v3.raw' } 
            });
            if (!response.ok) throw new Error();
            
            const arrayBuffer = await response.arrayBuffer();
            const workbook = XLSX.read(new Uint8Array(arrayBuffer), {type: 'array'});
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const json = XLSX.utils.sheet_to_json(sheet, {header: 1});

            const list = document.getElementById('dataList');
            let totalSum = 0;

            // Сар кардан аз сатри 4 (индекс 3)
            for (let i = 3; i < json.length; i++) {
                const row = json[i];
                // Агар дар сутуни B (ном) маълумот бошад
                if (row[1] && row[1].toString().trim() !== "") {
                    const name = row[1];
                    const opNum = row[34] || "---"; // Сутуни AI
                    const receiver = row[35] || "---"; // Сутуни AJ
                    const amount = parseFloat(row[36]) || 0; // Сутуни AK

                    // Сана аз сутуни J (индекс 9) оғоз мешавад ва ба рӯзи 7-уми апрел рост меояд
                    let dayStr = "---";
                    for (let col = 9; col <= 39; col++) { 
                        if (row[col]) {
                            let dayNumber = (col - 9) + 7; // (9-9)+7 = 7, (10-9)+7 = 8
                            dayStr = dayNumber + ".04.2026";
                            break;
                        }
                    }

                    totalSum += amount;

                    const card = document.createElement('div');
                    card.className = 'list-item';
                    card.innerHTML = `
                        <div class="item-header">
                            <span class="name">${name}</span>
                            <span class="amount-tag">${amount} TJS</span>
                        </div>
                        <div class="details-grid">
                            <div><span class="detail-label">Санаи пардохт</span>${dayStr || "---"}</div>
                            <div><span class="detail-label">Рақами амалиёт</span>${opNum}</div>
                            <div style="grid-column: span 2;"><span class="detail-label">Қабулкунанда</span>${receiver}</div>
                        </div>
                    `;
                    list.appendChild(card);
                }
            }

            document.getElementById('grandTotal').innerText = totalSum.toLocaleString();
            document.getElementById('loader').style.display = 'none';

        } catch (err) {
            document.getElementById('loader').innerHTML = `<div style="color:red; text-align:center; padding:20px;">Хатогӣ дар пайвастшавӣ ба GitHub API.</div>`;
        }
    }

    window.onload = loadExcel;
</script>
</body>
</html>
