<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мониторинги Фонди Марғеб</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --success: #22c55e;
            --text: #f8fafc;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            padding: 40px 20px;
            text-align: center;
            background: linear-gradient(180deg, rgba(56,189,248,0.1) 0%, rgba(15,23,42,1) 100%);
        }

        .dashboard {
            width: 95%;
            max-width: 500px;
            margin-top: -30px;
        }

        .main-card {
            background: var(--card);
            padding: 30px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .total-amount { font-size: 42px; font-weight: 800; color: var(--success); margin: 10px 0; }

        .list-container {
            width: 100%;
            margin-top: 20px;
            background: var(--card);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            margin-bottom: 30px;
        }

        .list-item {
            display: flex;
            justify-content: space-between;
            padding: 15px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .user-name { font-weight: 600; display: block; }
        .user-meta { font-size: 11px; opacity: 0.5; }
        .user-amount { font-weight: bold; color: var(--accent); }

        footer {
            margin-top: auto;
            padding: 30px;
            text-align: center;
            border-top: 1px solid rgba(255,255,255,0.1);
            width: 100%;
        }

        #loader { 
            position: fixed; inset: 0; background: var(--bg); 
            display: flex; justify-content: center; align-items: center; z-index: 100; 
        }

        .spinner {
            width: 40px; height: 40px; border: 4px solid rgba(56,189,248,0.1);
            border-left-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loader"><div class="spinner"></div></div>

<header>
    <h1 style="color: var(--accent); font-size: 20px; margin: 0;">ФОНДИ ДЕҲАИ МАРҒЕБ</h1>
    <div style="opacity: 0.6; font-size: 12px; margin-top: 5px;">Ҳисоботи зинда аз Excel</div>
</header>

<div class="dashboard">
    <div class="main-card">
        <div style="font-size: 12px; text-transform: uppercase; letter-spacing: 1px;">Маблағи умумӣ</div>
        <div class="total-amount" id="grandTotal">0</div>
        <div style="font-size: 14px; opacity: 0.5;">СОМОНӢ</div>
    </div>

    <div class="list-container" id="dataRows"></div>
</div>

<footer>
    <div style="opacity: 0.5; font-size: 11px; text-transform: uppercase;">Ҳисобот диҳанда</div>
    <div style="font-size: 18px; font-weight: 700; color: var(--accent); margin-top: 5px;">Нарзиев Маҳмадулло</div>
</footer>

<script>
    // Истифодаи AllOrigins барои гузаштан аз маҳдудияти CORS
    const rawUrl = 'https://github.com/mahmadullo2003/fondmargheb/raw/refs/heads/main/data.xlsx';
    const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(rawUrl)}`;

    async function loadExcel() {
        try {
            const response = await fetch(proxyUrl);
            if (!response.ok) throw new Error("Хатогӣ дар боркунӣ");
            
            const arrayBuffer = await response.arrayBuffer();
            const data = new Uint8Array(arrayBuffer);
            const workbook = XLSX.read(data, {type: 'array'});
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const json = XLSX.utils.sheet_to_json(sheet, {header: 1});

            const container = document.getElementById('dataRows');
            let totalSum = 0;

            // Хондан аз сатри 4 (индекс 3)
            for (let i = 3; i < json.length; i++) {
                const row = json[i];
                const name = row[1]; // Сутуни B
                const amount = parseFloat(row[36]) || 0; // Сутуни AK
                const opId = row[34] || "---"; // Сутуни AI

                if (name && name.trim() !== "") {
                    totalSum += amount;
                    const div = document.createElement('div');
                    div.className = 'list-item';
                    div.innerHTML = `
                        <div>
                            <span class="user-name">${name}</span>
                            <span class="user-meta">Амалиёт: ${opId}</span>
                        </div>
                        <div class="user-amount">${amount} TJS</div>
                    `;
                    container.appendChild(div);
                }
            }

            document.getElementById('grandTotal').innerText = totalSum.toLocaleString();
            document.getElementById('loader').style.display = 'none';

        } catch (err) {
            document.getElementById('loader').innerHTML = `<div style="color:red; text-align:center;">Хатогӣ: Файл хонда нашуд. <br> Танзимоти GitHub-ро санҷед.</div>`;
        }
    }

    window.onload = loadExcel;
</script>

</body>
</html>
